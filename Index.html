<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>To-Do List</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h1>📝 La Mia To-Do List</h1>
        
        <div class="input-container">
            <input 
                type="text" 
                id="taskInput" 
                placeholder="Aggiungi una nuova attività..."
                autocomplete="off"
            >
            <button id="addBtn">Aggiungi</button>
        </div>

        <div class="filter-buttons">
            <button class="filter-btn active" data-filter="all">Tutte</button>
            <button class="filter-btn" data-filter="active">Attive</button>
            <button class="filter-btn" data-filter="completed">Completate</button>
        </div>

        <ul id="taskList" class="task-list"></ul>

        <div class="stats">
            <p>Totale: <span id="totalTasks">0</span></p>
            <p>Completate: <span id="completedTasks">0</span></p>
            <button id="clearBtn" class="clear-btn">Cancella tutte completate</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
